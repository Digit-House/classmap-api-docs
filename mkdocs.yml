site_name: Class Map – API Docs
site_description: REST API reference for the Class Map Education Management System (Admin Portal & Mobile App)
site_author: Yoma Fleet / Digithouse
docs_dir: .
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Admin Portal:
    - Overview: classmap-admin/docs/index.md
    - Auth:
      - Login & Token Refresh: classmap-admin/docs/auth/login.md
    - Dashboard:
      - Overview: classmap-admin/docs/dashboard/overview.md
    - Schools:
      - School List: classmap-admin/docs/schools/list.md
      - General & Analytics: classmap-admin/docs/schools/detail.md
      - Daily Attendance: classmap-admin/docs/schools/attendance.md
      - Classes: classmap-admin/docs/schools/classes.md
      - Plans: classmap-admin/docs/schools/plans.md
      - Infrastructure: classmap-admin/docs/schools/infrastructure.md
      - Gallery: classmap-admin/docs/schools/gallery.md
      - Daily Logs: classmap-admin/docs/schools/daily-logs.md
      - Teachers: classmap-admin/docs/schools/teachers.md
  - Mobile App:
    - Overview: classmap-mobile/docs/index.md
    - Login & Authentication: classmap-mobile/docs/login.md
    - School Registration: classmap-mobile/docs/school-register.md
    - Teacher Registration: classmap-mobile/docs/teacher-register.md
  - Reference:
    - Backend Rules: yoma-api-skill.md
