site_name: Class Map – API Docs
site_description: REST API reference for the Class Map Education Management System (Admin Portal & Mobile App)
site_author: Yoma Fleet / Digithouse
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Admin Portal:
    - Overview: admin/index.md
    - Auth:
      - Login & Token Refresh: admin/auth/login.md
    - Dashboard:
      - Overview: admin/dashboard/overview.md
    - Schools:
      - School List: admin/schools/list.md
      - General & Analytics: admin/schools/detail.md
      - Daily Attendance: admin/schools/attendance.md
      - Classes: admin/schools/classes.md
      - Plans: admin/schools/plans.md
      - Infrastructure: admin/schools/infrastructure.md
      - Gallery: admin/schools/gallery.md
      - Daily Logs: admin/schools/daily-logs.md
      - Teachers: admin/schools/teachers.md
    - Notifications:
      - Management: admin/notifications/management.md
  - Mobile App:
    - Overview: mobile/index.md
    - Login & Authentication: mobile/login.md
    - School Registration: mobile/school-register.md
    - Teacher Registration: mobile/teacher-register.md
  - Reference:
    - Backend Rules: yoma-api-skill.md
