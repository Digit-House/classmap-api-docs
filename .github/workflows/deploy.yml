name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare docs
        run: |
          rm -rf docs/admin docs/mobile docs/images docs/yoma-api-skill.md
          mkdir -p docs/admin docs/mobile docs/images
          cp -r classmap-admin/docs/* docs/admin/
          cp -r classmap-mobile/docs/* docs/mobile/
          cp -r classmap-mobile/images/* docs/images/
          cp yoma-api-skill.md docs/

      - name: Build docs (validate)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
